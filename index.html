<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCLI Dashboard - AI Network Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .terminal-font {
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        .mode-active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: rgba(59, 130, 246, 1); }
            100% { border-color: rgba(59, 130, 246, 0.5); }
        }
        .ai-loading {
            animation: pulse-border 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-12 text-center flex flex-col md:flex-row justify-between items-center">
            <div class="text-left">
                <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent mb-2">
                    AutoCLI Tool <span class="text-sm font-light italic opacity-70">Pro Edition</span>
                </h1>
                <p class="text-slate-400 uppercase tracking-tighter text-sm font-semibold">Automazione Intelligente per Network Admin & DevOps</p>
            </div>
            
            <!-- API Key Setup (Necessario per GitHub) -->
            <div class="mt-4 md:mt-0 flex items-center bg-slate-800/50 p-2 rounded-xl border border-slate-700">
                <input id="userApiKey" type="password" placeholder="Inserisci Gemini API Key" 
                    class="bg-transparent border-none text-xs px-3 py-1 outline-none w-48 text-blue-300">
                <button onclick="saveApiKey()" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded-lg text-[10px] font-bold uppercase transition-all">
                    Set Key
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Pannello di Creazione -->
            <div class="lg:col-span-1">
                <div id="configPanel" class="glass-card p-6 rounded-2xl sticky top-8 transition-all">
                    <h2 class="text-xl font-semibold mb-6 flex items-center">
                        <span class="mr-2">🚀</span> Generatore Avanzato
                    </h2>
                    
                    <div class="space-y-6">
                        <!-- Modalità Selettore -->
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Piattaforma Target</label>
                            <div class="grid grid-cols-2 gap-2 p-1 bg-slate-900 rounded-xl border border-slate-700">
                                <button onclick="setMode('standard')" id="mode-standard" class="py-2 text-sm rounded-lg transition-all mode-active">Shell Standard</button>
                                <button onclick="setMode('cisco')" id="mode-cisco" class="py-2 text-sm rounded-lg transition-all text-slate-400">Cisco IOS</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Cosa vuoi configurare?</label>
                            <div class="relative">
                                <input id="taskName" type="text" placeholder="es. VLAN 100 su GigabitEthernet 0/1" 
                                    class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-4 pr-12 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <button onclick="generateWithAI()" id="aiBtn" class="absolute right-2 top-1.5 p-1.5 bg-blue-600 hover:bg-blue-500 rounded-md transition-colors" title="Genera con IA">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M11.3 1.047a.75.75 0 01.974.134l3.5 4.5a.75.75 0 01-.112 1.056l-5 4.5a.75.75 0 11-1.012-1.123l4.24-3.816-2.951-3.793a.75.75 0 01.361-1.158zM4.7 18.953a.75.75 0 01-.974-.134l-3.5-4.5a.75.75 0 01.112-1.056l5-4.5a.75.75 0 111.012 1.123l-4.24 3.816 2.951 3.793a.75.75 0 01-.361 1.158z" clip-rule="evenodd" />
                                        <path fill-rule="evenodd" d="M12.3 18.953a.75.75 0 00.974-.134l3.5-4.5a.75.75 0 00-.112-1.056l-5-4.5a.75.75 0 10-1.012 1.123l4.24 3.816-2.951 3.793a.75.75 0 00.361 1.158zM7.7 1.047a.75.75 0 00-.974.134l-3.5 4.5a.75.75 0 00.112 1.056l5-4.5a.75.75 0 101.012-1.123L5.138 5.25l2.951-3.793a.75.75 0 00-.361-1.158z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Preview Comandi</label>
                            <textarea id="taskCmds" rows="8" placeholder="I comandi verranno generati con la gerarchia corretta..."
                                class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all terminal-font text-sm leading-relaxed"></textarea>
                        </div>

                        <button onclick="saveTask()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg hover:shadow-indigo-500/20">
                            Salva nel Database
                        </button>
                    </div>
                </div>
            </div>

            <!-- Elenco Task -->
            <div class="lg:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold">Libreria Configurazione</h2>
                    <button onclick="clearAll()" class="text-sm text-red-400 hover:text-red-300 transition-colors bg-red-500/10 px-3 py-1 rounded-lg">
                        Svuota Tutto
                    </button>
                </div>
                
                <div id="tasksList" class="space-y-6">
                    <!-- I task verranno inseriti qui -->
                </div>

                <div id="emptyState" class="text-center py-20 bg-slate-800/30 rounded-2xl border-2 border-dashed border-slate-700 hidden">
                    <p class="text-slate-500 italic">Nessun comando in archivio.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-8 right-8 bg-blue-500 text-white px-6 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        Copiato negli appunti!
    </div>

    <script>
        // Gestione API Key per GitHub / Esterno
        let apiKey = localStorage.getItem('autocli_api_key') || "";
        if (apiKey) document.getElementById('userApiKey').value = apiKey;

        function saveApiKey() {
            const key = document.getElementById('userApiKey').value.trim();
            if (key) {
                apiKey = key;
                localStorage.setItem('autocli_api_key', key);
                showToast("API Key salvata localmente!");
            }
        }

        let tasks = JSON.parse(localStorage.getItem('autocli_tasks_v4')) || [];
        let currentMode = 'standard';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-standard').className = mode === 'standard' ? 'py-2 text-sm rounded-lg transition-all mode-active' : 'py-2 text-sm rounded-lg transition-all text-slate-400';
            document.getElementById('mode-cisco').className = mode === 'cisco' ? 'py-2 text-sm rounded-lg transition-all mode-active' : 'py-2 text-sm rounded-lg transition-all text-slate-400';
            
            const nameInput = document.getElementById('taskName');
            nameInput.placeholder = mode === 'cisco' ? "es. Descrizione 'Link-Uplink' su porta Gi0/1" : "es. Crea cartella logs e sposta i .txt";
        }

        async function generateWithAI() {
            if (!apiKey) {
                showToast("Inserisci prima l'API Key in alto!");
                return;
            }

            const promptInput = document.getElementById('taskName');
            const cmdOutput = document.getElementById('taskCmds');
            const aiBtn = document.getElementById('aiBtn');
            const panel = document.getElementById('configPanel');

            if (!promptInput.value) {
                showToast("Specifica l'azione desiderata!");
                return;
            }

            aiBtn.disabled = true;
            panel.classList.add('ai-loading');
            cmdOutput.placeholder = "Generazione in corso...";
            
            const systemPrompt = `Sei un Senior Network Engineer. 
            Se la modalità è 'cisco', genera comandi Cisco IOS. 
            IMPORTANTE: Inizia SEMPRE con 'enable' e 'configure terminal'. 
            Se la richiesta riguarda un'interfaccia o una VLAN specifica, DEVI includere il comando 'interface' o 'vlan' appropriato per entrare nel sotto-contesto prima dei comandi di setting.
            Concludi SEMPRE con 'end' e 'write memory'.
            
            Se la modalità è 'standard', genera script Bash. 
            Usa 'sudo' se necessario.
            
            Rispondi SOLO con i comandi, uno per riga, senza markdown o commenti.
            Modalità attuale: ${currentMode}.
            Richiesta utente: ${promptInput.value}`;

            try {
                let responseText = await callGemini(promptInput.value, systemPrompt);
                cmdOutput.value = responseText.replace(/```/g, '').trim();
                showToast("Script generato!");
            } catch (error) {
                showToast("Errore API: Controlla la tua Key.");
            } finally {
                aiBtn.disabled = false;
                panel.classList.remove('ai-loading');
            }
        }

        async function callGemini(query, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            let retries = 0;
            const maxRetries = 5;
            
            while (retries < maxRetries) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: systemInstruction }] }
                        })
                    });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (e) {
                    retries++;
                    await new Promise(res => setTimeout(res, Math.pow(2, retries) * 1000));
                }
            }
        }

        function saveTask() {
            const nameInput = document.getElementById('taskName');
            const cmdsInput = document.getElementById('taskCmds');
            
            if (!nameInput.value || !cmdsInput.value) {
                showToast("Nulla da salvare!");
                return;
            }

            const newTask = {
                id: Date.now(),
                name: nameInput.value,
                mode: currentMode,
                commands: cmdsInput.value.split('\n').filter(cmd => cmd.trim() !== '')
            };

            tasks.unshift(newTask);
            localStorage.setItem('autocli_tasks_v4', JSON.stringify(tasks));
            
            nameInput.value = '';
            cmdsInput.value = '';
            renderTasks();
            showToast("Aggiunto in libreria!");
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('autocli_tasks_v4', JSON.stringify(tasks));
            renderTasks();
        }

        function copyCommands(id) {
            const task = tasks.find(t => t.id === id);
            let finalOutput = "";

            if (task.mode === 'cisco') {
                finalOutput = task.commands.join('\n');
            } else {
                finalOutput = task.commands.join(' && ');
            }
            
            const el = document.createElement('textarea');
            el.value = finalOutput;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("Pronto da incollare!");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2500);
        }

        function clearAll() {
            if (confirm("Eliminare l'intera libreria?")) {
                tasks = [];
                localStorage.removeItem('autocli_tasks_v4');
                renderTasks();
            }
        }

        function renderTasks() {
            const list = document.getElementById('tasksList');
            const empty = document.getElementById('emptyState');
            list.innerHTML = '';

            if (tasks.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                tasks.forEach(task => {
                    const isCisco = task.mode === 'cisco';
                    const card = document.createElement('div');
                    card.className = 'glass-card p-6 rounded-2xl border-l-4 ' + (isCisco ? 'border-l-blue-500' : 'border-l-emerald-500') + ' transition-all hover:bg-slate-800/40';
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-1">
                                <div class="flex items-center space-x-2">
                                    <h3 class="text-lg font-bold text-white">${task.name}</h3>
                                    <span class="px-2 py-0.5 text-[9px] font-black uppercase rounded ${isCisco ? 'bg-blue-500/20 text-blue-400' : 'bg-emerald-500/20 text-emerald-400'}">
                                        ${task.mode}
                                    </span>
                                </div>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="copyCommands(${task.id})" class="flex items-center space-x-2 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg text-xs transition-colors border border-slate-700">
                                    <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                    </svg>
                                    <span>Copia</span>
                                </button>
                                <button onclick="deleteTask(${task.id})" class="p-1.5 hover:bg-red-500/20 rounded-lg text-red-500 transition-colors">
                                    <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="bg-slate-950/90 rounded-xl p-4 terminal-font text-xs text-slate-300 border border-slate-800">
                            <div class="space-y-1">
                                ${task.commands.map(cmd => {
                                    let color = "text-slate-300";
                                    if(cmd.includes('interface') || cmd.includes('vlan ')) color = "text-yellow-400 font-bold";
                                    if(cmd.includes('configure terminal') || cmd.includes('enable')) color = "text-blue-400 italic";
                                    return `<div class="flex"><span class="text-slate-600 mr-2 opacity-50">></span> <span class="${color}">${cmd}</span></div>`;
                                }).join('')}
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            }
        }

        renderTasks();
    </script>
</body>
</html>
