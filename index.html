<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCLI Dashboard - AI Network Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .terminal-font {
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        .mode-active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: rgba(59, 130, 246, 1); }
            100% { border-color: rgba(59, 130, 246, 0.5); }
        }
        .ai-loading {
            animation: pulse-border 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-12 text-center flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-left">
                <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent mb-2">
                    AutoCLI Tool <span class="text-sm font-light italic opacity-70">Pro Edition</span>
                </h1>
                <p class="text-slate-400 uppercase tracking-tighter text-sm font-semibold">Automazione Intelligente per Network Admin & DevOps</p>
            </div>
            
            <!-- API Key Setup -->
            <div class="flex items-center bg-slate-800/50 p-2 rounded-xl border border-slate-700">
                <input id="userApiKey" type="password" placeholder="Inserisci Gemini API Key" 
                    class="bg-transparent border-none text-xs px-3 py-1 outline-none w-48 text-blue-300">
                <button onclick="saveApiKey()" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded-lg text-[10px] font-bold uppercase transition-all whitespace-nowrap">
                    Set Key
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Pannello di Creazione -->
            <div class="lg:col-span-1">
                <div id="configPanel" class="glass-card p-6 rounded-2xl sticky top-8 transition-all">
                    <h2 class="text-xl font-semibold mb-6 flex items-center">
                        <span class="mr-2">🚀</span> Generatore Avanzato
                    </h2>
                    
                    <div class="space-y-6">
                        <!-- Modalità Selettore -->
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Piattaforma Target</label>
                            <div class="grid grid-cols-2 gap-2 p-1 bg-slate-900 rounded-xl border border-slate-700">
                                <button onclick="setMode('standard')" id="mode-standard" class="py-2 text-sm rounded-lg transition-all mode-active">Shell Standard</button>
                                <button onclick="setMode('cisco')" id="mode-cisco" class="py-2 text-sm rounded-lg transition-all text-slate-400">Cisco IOS</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Cosa vuoi configurare?</label>
                            <div class="relative">
                                <input id="taskName" type="text" placeholder="es. VLAN 100 su GigabitEthernet 0/1" 
                                    class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-4 pr-12 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <button onclick="generateWithAI()" id="aiBtn" class="absolute right-2 top-1.5 p-1.5 bg-blue-600 hover:bg-blue-500 rounded-md transition-colors" title="Genera con IA">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M11.3 1.047a.75.75 0 01.974.134l3.5 4.5a.75.75 0 01-.112 1.056l-5 4.5a.75.75 0 11-1.012-1.123l4.24-3.816-2.951-3.793a.75.75 0 01.361-1.158zM4.7 18.953a.75.75 0 01-.974-.134l-3.5-4.5a.75.75 0 01.112-1.056l5-4.5a.75.75 0 111.012 1.123l-4.24 3.816 2.951 3.793a.75.75 0 01-.361 1.158z" clip-rule="evenodd" />
                                        <path fill-rule="evenodd" d="M12.3 18.953a.75.75 0 00.974-.134l3.5-4.5a.75.75 0 00-.112-1.056l-5-4.5a.75.75 0 10-1.012 1.123l4.24 3.816-2.951-3.793a.75.75 0 00.361 1.158zM7.7 1.047a.75.75 0 00-.974.134l-3.5 4.5a.75.75 0 00.112 1.056l5-4.5a.75.75 0 101.012-1.123L5.138 5.25l2.951-3.793a.75.75 0 00-.361-1.158z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Preview Comandi</label>
                            <textarea id="taskCmds" rows="8" placeholder="I comandi verranno generati con la gerarchia corretta..."
                                class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all terminal-font text-sm leading-relaxed"></textarea>
                        </div>

                        <button onclick="saveTask()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg hover:shadow-indigo-500/20">
                            Salva nel Database
                        </button>
                    </div>
                </div>
            </div>

            <!-- Elenco Task -->
            <div class="lg:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold">Libreria Configurazione</h2>
                    <button onclick="clearAll()" class="text-sm text-red-400 hover:text-red-300 transition-colors bg-red-500/10 px-3 py-1 rounded-lg">
                        Svuota Tutto
                    </button>
                </div>
                
                <div id="tasksList" class="space-y-6">
                    <!-- I task verranno inseriti qui -->
                </div>

                <div id="emptyState" class="text-center py-20 bg-slate-800/30 rounded-2xl border-2 border-dashed border-slate-700 hidden">
                    <p class="text-slate-500 italic">Nessun comando in archivio.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-8 right-8 bg-blue-500 text-white px-6 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        Copiato negli appunti!
    </div>

    <script>
        let apiKey = localStorage.getItem('autocli_api_key') || "";
        if (apiKey) document.getElementById('userApiKey').value = apiKey;

        function saveApiKey() {
            const key = document.getElementById('userApiKey').value.trim();
            if (key) {
                apiKey = key;
                localStorage.setItem('autocli_api_key', key);
                showToast("API Key salvata!");
            }
        }

        let tasks = JSON.parse(localStorage.getItem('autocli_tasks_v4')) || [];
        let currentMode = 'standard';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-standard').className = mode === 'standard' ? 'py-2 text-sm rounded-lg transition-all mode-active' : 'py-2 text-sm rounded-lg transition-all text-slate-400';
            document.getElementById('mode-cisco').className = mode === 'cisco' ? 'py-2 text-sm rounded-lg transition-all mode-active' : 'py-2 text-sm rounded-lg transition-all text-slate-400';
            const nameInput = document.getElementById('taskName');
            nameInput.placeholder = mode === 'cisco' ? "es. VLAN 100 su GigabitEthernet 0/1" : "es. Crea cartella logs e sposta i .txt";
        }

        async function generateWithAI() {
            if (!apiKey) {
                showToast("Inserisci la Key in alto!");
                return;
            }

            const promptInput = document.getElementById('taskName');
            const cmdOutput = document.getElementById('taskCmds');
            const aiBtn = document.getElementById('aiBtn');
            const panel = document.getElementById('configPanel');

            if (!promptInput.value) return;

            aiBtn.disabled = true;
            panel.classList.add('ai-loading');
            cmdOutput.placeholder = "Verifica connettività AI...";
            
            const systemPrompt = `Sei un Senior Network Engineer specializzato in automazione. 
            Genera una lista di comandi CLI per la seguente richiesta.
            Target: ${currentMode}.
            
            REGOLE:
            - Se 'cisco': inizia con 'enable', poi 'configure terminal'. Includi i comandi necessari e termina con 'end' e 'write memory'.
            - Se 'standard': genera comandi Bash/Linux.
            - Rispondi SOLO con il codice dei comandi, un comando per riga.
            - NON usare markdown (\`\`\`), NON aggiungere commenti o spiegazioni.`;

            // Strategia di rotazione basata su versioni diverse
            const configs = [
                { url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent", label: "v1beta Flash" },
                { url: "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent", label: "v1 Stable Flash" },
                { url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent", label: "v1beta Pro" }
            ];

            let success = false;
            let debugLog = [];

            for (const config of configs) {
                if (success) break;
                
                try {
                    console.log(`Tentativo con ${config.label}...`);
                    const response = await fetch(`${config.url}?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ 
                                parts: [{ text: `${systemPrompt}\n\nRichiesta utente: ${promptInput.value}` }] 
                            }]
                        })
                    });
                    
                    const result = await response.json();

                    if (response.ok) {
                        if (result.candidates && result.candidates[0].content) {
                            const text = result.candidates[0].content.parts[0].text;
                            cmdOutput.value = text.replace(/```[a-z]*\n?/gi, '').replace(/```/g, '').trim();
                            showToast("IA Risponde!");
                            success = true;
                        }
                    } else {
                        const msg = result.error?.message || response.statusText;
                        debugLog.push(`${config.label}: ${response.status} (${msg})`);
                    }
                } catch (e) {
                    debugLog.push(`${config.label}: Network Error`);
                }
            }

            if (!success) {
                cmdOutput.value = "LOG ERRORI:\n" + debugLog.join('\n');
                showToast("Errore di connessione AI.");
            }

            aiBtn.disabled = false;
            panel.classList.remove('ai-loading');
        }

        function saveTask() {
            const name = document.getElementById('taskName').value;
            const cmds = document.getElementById('taskCmds').value;
            if (!name || !cmds) {
                showToast("Compila i campi prima di salvare!");
                return;
            }

            tasks.unshift({
                id: Date.now(),
                name: name,
                mode: currentMode,
                commands: cmds.split('\n').filter(c => c.trim())
            });
            localStorage.setItem('autocli_tasks_v4', JSON.stringify(tasks));
            renderTasks();
            document.getElementById('taskName').value = '';
            document.getElementById('taskCmds').value = '';
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('autocli_tasks_v4', JSON.stringify(tasks));
            renderTasks();
        }

        function copyCommands(id) {
            const task = tasks.find(t => t.id === id);
            const text = task.mode === 'cisco' ? task.commands.join('\n') : task.commands.join(' && ');
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("Copiato negli appunti!");
            } catch (err) {
                showToast("Errore durante la copia.");
            }
            document.body.removeChild(textArea);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function clearAll() {
            if (confirm("Sei sicuro di voler svuotare tutta la libreria?")) {
                tasks = [];
                localStorage.removeItem('autocli_tasks_v4');
                renderTasks();
            }
        }

        function renderTasks() {
            const list = document.getElementById('tasksList');
            const empty = document.getElementById('emptyState');
            list.innerHTML = '';
            if (!tasks.length) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            tasks.forEach(t => {
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-2xl border-l-4 ${t.mode === 'cisco' ? 'border-l-blue-500' : 'border-l-emerald-500'} hover:shadow-xl transition-all`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-bold text-lg">${t.name}</h3>
                            <span class="text-[10px] font-black tracking-widest uppercase bg-slate-900 px-2 py-1 rounded text-slate-500">${t.mode}</span>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="copyCommands(${t.id})" class="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs transition-colors">Copia</button>
                            <button onclick="deleteTask(${t.id})" class="p-2 bg-red-900/20 text-red-500 hover:bg-red-900/40 rounded-lg text-xs transition-colors">Elimina</button>
                        </div>
                    </div>
                    <div class="bg-slate-950 p-4 rounded-xl text-xs terminal-font text-slate-400 border border-slate-800">
                        ${t.commands.map(c => `<div class="flex"><span class="text-slate-700 mr-2">$</span><span>${c}</span></div>`).join('')}
                    </div>
                `;
                list.appendChild(card);
            });
        }
        renderTasks();
    </script>
</body>
</html>
